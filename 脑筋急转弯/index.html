<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>脑筋急转弯</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333}
.app{width:100%;max-width:480px;margin:0 auto;height:100vh;position:relative;overflow:hidden}
.page{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.hidden{display:none}

/* 封面页 */
.cover-page{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#ffecd2 0%,#fcb69f 100%);padding:20px 16px;padding-bottom:calc(env(safe-area-inset-bottom,20px)+20px)}
.cover-icon{width:140px;height:140px;border-radius:30px;background:linear-gradient(135deg,#ff6b6b,#ee5a24);display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 12px 28px rgba(238,90,36,.35);position:relative;z-index:1}
.cover-icon span{font-size:64px}
.cover-title{font-size:28px;font-weight:800;color:#2d3436;margin-bottom:6px;letter-spacing:3px;text-align:center}
.cover-sub{font-size:14px;color:#636e72;margin-bottom:40px;letter-spacing:1px}
.cover-btn{width:220px;height:52px;border-radius:26px;border:none;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;font-size:16px;font-weight:700;letter-spacing:2px;box-shadow:0 8px 24px rgba(0,184,148,.25);cursor:pointer;position:relative;z-index:1}
.cover-btn:active{transform:scale(.96)}
.cover-stats{display:flex;gap:32px;margin-top:36px;position:relative;z-index:1}
.cover-stat{text-align:center;background:rgba(255,255,255,.7);padding:16px 20px;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.cover-stat b{display:block;font-size:24px;color:#2d3436;font-weight:800}
.cover-stat small{font-size:11px;color:#636e72}

/* 关卡选择页 */
.select-page{display:flex;flex-direction:column;background:#f5f5f5}
.sel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(env(safe-area-inset-top,0)+12px);background:#fff;position:sticky;top:0;z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.sel-back{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sel-back:active{transform:scale(.92)}
.sel-head h2{font-size:20px;color:#2d3436;font-weight:700}
.sel-head-right{width:40px}
.sel-progress{margin:16px 16px 12px}
.sel-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.sel-bar-fill{height:100%;background:linear-gradient(90deg,#00b894,#00cec9);border-radius:4px;transition:width .4s}
.sel-bar-text{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:#636e72}
.sel-pn{font-size:13px;color:#636e72;text-align:center;padding:4px 0 14px}
.sel-grid{flex:1;padding:0 12px 140px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.level-card{background:#fff;border-radius:16px;border:2px solid #e0e0e0;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.level-card:active{transform:scale(.96)}
.level-card.done{border-color:#00b894;background:linear-gradient(135deg,#f0fff9,#e0fff0)}
.level-card-top{height:76px;background:linear-gradient(135deg,#f8f9fa,#e9ecef);display:flex;align-items:center;justify-content:center;position:relative}
.level-card.done .level-card-top{background:linear-gradient(135deg,#e0fff0,#c0ffdf)}
.level-card-top span{font-size:36px}
.level-card-tag{position:absolute;top:8px;right:8px;background:linear-gradient(135deg,#ff9f43,#ee5a24);color:#fff;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700}
.level-card.done .level-card-tag{background:linear-gradient(135deg,#00b894,#00cec9)}
.level-card-bot{padding:10px 12px 12px}
.level-card-name{font-size:14px;font-weight:700;color:#2d3436;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.level-card-info{font-size:11px;color:#636e72}
.level-card-check{position:absolute;top:8px;left:8px;width:26px;height:26px;background:linear-gradient(135deg,#00b894,#00cec9);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.sel-foot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(0deg,#f5f5f5 85%,transparent);padding:14px 12px;padding-bottom:calc(env(safe-area-inset-bottom,14px)+14px);display:flex;gap:8px;z-index:5}
.sel-fbtn{flex:1;height:48px;border-radius:14px;border:2px solid #e0e0e0;background:#fff;color:#2d3436;font-size:13px;font-weight:700;cursor:pointer}
.sel-fbtn:active{opacity:.8}
.sel-fbtn.pri{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;box-shadow:0 4px 12px rgba(0,184,148,.25)}
.sel-fbtn.dan{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;border:none}

/* 答题页 */
.game-page{display:flex;flex-direction:column;background:#fff}
.g-head{background:linear-gradient(135deg,#00b894,#00cec9);padding:12px 16px;padding-top:calc(env(safe-area-inset-top,0)+12px);color:#fff}
.g-head-top{display:flex;align-items:center;justify-content:space-between}
.g-back{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.18);color:#fff;border:none;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.g-back:active{transform:scale(.92)}
.g-tag{background:rgba(255,255,255,.18);padding:4px 10px;border-radius:14px;font-size:13px;font-weight:700}
.g-head-r{width:40px}
.g-bar{height:6px;background:rgba(255,255,255,.25);border-radius:3px;margin-top:10px;overflow:hidden}
.g-bar-fill{height:100%;background:#fff;border-radius:3px;transition:width .35s}
.g-body{flex:1;padding:20px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.g-title{font-size:18px;font-weight:800;color:#2d3436;margin-bottom:14px;line-height:1.4}
.g-q{background:linear-gradient(135deg,#f8f9fa,#e9ecef);padding:18px;border-radius:16px;font-size:15px;line-height:1.8;color:#2d3436;border:2px solid #e0e0e0}
.g-ans{margin-top:14px;background:linear-gradient(135deg,#fff3cd,#ffeeba);padding:16px;border-radius:16px;border:2px solid #ffc107;display:none}
.g-ans.show{display:block}
.g-ans-label{font-size:13px;color:#856404;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.g-ans-label::before{content:'';width:4px;height:14px;background:#ffc107;border-radius:2px}
.g-ans-text{font-size:16px;font-weight:800;color:#2d3436;line-height:1.7}
.g-input-area{margin-top:14px;display:flex;gap:10px}
.g-input{flex:1;height:48px;padding:0 16px;border:2px solid #e0e0e0;border-radius:14px;font-size:15px;background:#fff;outline:none;transition:border-color .2s}
.g-input:focus{border-color:#00b894}
.g-submit-btn{height:48px;padding:0 24px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer}
.g-submit-btn:active{opacity:.85}
.g-result{margin-top:14px;padding:14px;border-radius:12px;text-align:center;font-weight:700;font-size:15px;display:none}
.g-result.correct{background:linear-gradient(135deg,#d4edda,#c3e6cb);color:#155724;border:2px solid #28a745}
.g-result.wrong{background:linear-gradient(135deg,#f8d7da,#f5c6cb);color:#721c24;border:2px solid #dc3545}
.g-foot{padding:14px 16px;padding-bottom:calc(env(safe-area-inset-bottom,14px)+14px);display:flex;gap:8px;background:#f5f5f5}
.g-btn{height:50px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.g-btn:active{opacity:.85}
.g-btn-prev{width:56px;background:#fff;border:2px solid #e0e0e0;color:#636e72;font-size:20px}
.g-btn-ans{flex:1;background:#fff;border:2px solid #e0e0e0;color:#2d3436}
.g-btn-next{flex:1;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;box-shadow:0 4px 12px rgba(0,184,148,.25)}

/* 弹窗 */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:24px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:24px;padding:32px 26px;max-width:330px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal-emoji{font-size:64px;margin-bottom:8px}
.modal h2{font-size:22px;color:#2d3436;margin-bottom:6px}
.modal p{color:#636e72;font-size:14px;margin-bottom:22px;line-height:1.6}
.modal-btn{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;padding:14px 48px;border-radius:24px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(0,184,148,.25)}
.modal-btn:active{transform:scale(.96)}

/* 提示 */
.float-hint{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(45,52,54,.92);color:#00cec9;padding:12px 28px;border-radius:14px;font-size:16px;font-weight:700;z-index:50;pointer-events:none;animation:floatUp .85s ease forwards}
@keyframes floatUp{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}50%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%)}}
.confetti{position:fixed;top:-10px;z-index:99;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="app" id="app">

<div class="page cover-page" id="pgCover">
    <div class="cover-icon"><span>🧠</span></div>
    <div class="cover-title">脑筋急转弯</div>
    <div class="cover-sub">500道趣味智力题</div>
    <button class="cover-btn" id="btnStart">开始挑战</button>
    <div class="cover-stats">
        <div class="cover-stat"><b id="cvTotal">500</b><small>总关卡</small></div>
        <div class="cover-stat"><b id="cvDone">0</b><small>已通关</small></div>
        <div class="cover-stat"><b id="cvRate">0%</b><small>完成度</small></div>
    </div>
</div>

<div class="page select-page hidden" id="pgSelect">
    <div class="sel-head">
        <button class="sel-back" id="btnSelBack">‹</button>
        <h2>选择关卡</h2>
        <div class="sel-head-right"></div>
    </div>
    <div class="sel-progress">
        <div class="sel-bar"><div class="sel-bar-fill" id="selBarFill"></div></div>
        <div class="sel-bar-text"><span>已通关</span><span id="selProgress">0/500</span></div>
    </div>
    <div class="sel-pn" id="selPn">1 / 50</div>
    <div class="sel-grid" id="selGrid"></div>
    <div class="sel-foot">
        <button class="sel-fbtn" id="btnPrev">上一页</button>
        <button class="sel-fbtn pri" id="btnContinue">继续挑战</button>
        <button class="sel-fbtn dan" id="btnReset">重置</button>
        <button class="sel-fbtn" id="btnNext">下一页</button>
    </div>
</div>

<div class="page game-page hidden" id="pgGame">
    <div class="g-head">
        <div class="g-head-top">
            <button class="g-back" id="btnGameBack">‹</button>
            <div class="g-tag" id="gTag">第 1 关</div>
            <div class="g-head-r"></div>
        </div>
        <div class="g-bar"><div class="g-bar-fill" id="gBarFill"></div></div>
    </div>
    <div class="g-body" id="gBody">
        <div class="g-title" id="gTitle"></div>
        <div class="g-q" id="gQ"></div>
        <div class="g-input-area">
            <input type="text" class="g-input" id="gInput" placeholder="请输入你的答案..." maxlength="50">
            <button class="g-submit-btn" id="gSubmitBtn">提交答案</button>
        </div>
        <div class="g-result" id="gResult"></div>
        <div class="g-ans" id="gAns">
            <div class="g-ans-label">正确答案</div>
            <div class="g-ans-text" id="gAnsText"></div>
        </div>
    </div>
    <div class="g-foot">
        <button class="g-btn g-btn-prev" id="btnPrevLv">‹</button>
        <button class="g-btn g-btn-ans" id="btnAns">查看答案</button>
        <button class="g-btn g-btn-next" id="btnNextLv">下一关 ›</button>
    </div>
</div>

<div class="modal-bg" id="modalBg">
    <div class="modal">
        <div class="modal-emoji">🎉</div>
        <h2>恭喜通关！</h2>
        <p>你已完成全部500道脑筋急转弯！<br>太厉害了！</p>
        <button class="modal-btn" id="btnModal">再来一次</button>
    </div>
</div>

</div>

{t:"爸爸修钟表",q:"六岁的小明总是喜欢把家里的闹钟整坏，妈妈为什么总是让不会修理钟表的爸爸代为修理？",a:"因为妈妈让爸爸好好的修理一下小明"},

{t:"贴创可贴",q:"小李喝酒，撞伤了脸，回家怕太太知道会责备，去洗手间对着镜子贴上创口贴，可第二天还是被太太骂了一顿，为什么？",a:"创口贴在镜子上"},
{t:"最怕问路",q:"如果有人向你问路，你最怕听到哪一句话？",a:"这里是地球吗？"},
{t:"输的有奖品",q:"哪种比赛，赢的得不到奖品，输的却有奖品？",a:"划拳喝酒"},
{t:"打不开的门",q:"小张被关在一间没有上锁的房里，可是他使出吃奶的力气也不能把门拉开，这是为什么？",a:"推开就可以了"},
{t:"牛的尾巴",q:"有一头头朝北的牛，它向右转原地转三圈，然后向后转原地转三圈，接着再往右转，这时候它尾巴朝哪？",a:"朝下"},

{t:"两对父子买帽子",q:"两对父子去买帽子，每人买了一顶，却为什么只买了三顶？",a:"祖孙三代人"},
{t:"什么瓜不能吃",q:"什么瓜不能吃？",a:"傻瓜"},
{t:"最细的针成语",q:"最细的针？打一成语",a:"无孔不入"},
{t:"大家齐欢乐地名",q:"大家齐欢乐！打一地名？",a:"齐齐哈尔"}
];

var curLv=0,curPg=0,ansShow=false;
var done=new Set();
var KEY='riddle_v3',PPG=10;
var emojis=['🧠','💡','❓','🎯','🔑','🎲','🧩','⚡','🌟','🎪'];

function load(){try{var s=localStorage.getItem(KEY);if(s)done=new Set(JSON.parse(s))}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify([...done]))}catch(e){}}

function $(id){return document.getElementById(id)}

function showPg(id){
  ['pgCover','pgSelect','pgGame'].forEach(function(p){
    $(p).classList.toggle('hidden',p!==id);
  });
  if(id==='pgCover') updCover();
  if(id==='pgSelect') renderSel();
  if(id==='pgGame') renderGame();
}

function updCover(){
  $('cvTotal').textContent=L.length;
  $('cvDone').textContent=done.size;
  $('cvRate').textContent=Math.round(done.size/L.length*100)+'%';
}

function renderSel(){
  var tp=Math.ceil(L.length/PPG);
  $('selPn').textContent=(curPg+1)+' / '+tp;
  $('selBarFill').style.width=(done.size/L.length*100)+'%';
  $('selProgress').textContent=done.size+'/'+L.length;
  $('btnPrev').style.opacity=curPg>0?'1':'.4';
  $('btnNext').style.opacity=curPg<tp-1?'1':'.4';
  var g=$('selGrid');
  g.innerHTML='';
  var s=curPg*PPG,e=Math.min(s+PPG,L.length);
  for(var i=s;i<e;i++){
    var d=done.has(i);
    var c=document.createElement('div');
    c.className='level-card'+(d?' done':'');
    c.setAttribute('data-i',i);
    c.innerHTML='<div class="level-card-top"><span>'+emojis[i%10]+'</span><span class="level-card-tag">'+(i+1)+'</span></div><div class="level-card-bot"><div class="level-card-name">'+L[i].t+'</div><div class="level-card-info">'+(d?'已通关':'待挑战')+'</div></div>'+(d?'<div class="level-card-check">✓</div>':'');
    g.appendChild(c);
  }
}

function renderGame(){
  var lv=L[curLv];
  $('gTag').textContent='第 '+(curLv+1)+' 关';
  $('gBarFill').style.width=(done.size/L.length*100)+'%';
  $('gTitle').textContent=lv.t;
  $('gQ').textContent=lv.q;
  $('gAnsText').textContent=lv.a;
  $('gInput').value='';
  $('gResult').style.display='none';
  $('gResult').className='g-result';
  ansShow=false;
  $('gAns').classList.remove('show');
  $('btnAns').textContent='查看答案';
  $('gBody').scrollTop=0;
  $('btnPrevLv').style.opacity=curLv>0?'1':'.3';
  $('btnNextLv').style.opacity=curLv<L.length-1?'1':'.3';
}

function submitAnswer(){
  var userAnswer=$('gInput').value.trim();
  if(!userAnswer){
    floatHint('请输入答案');
    return;
  }
  var lv=L[curLv];
  var ca=lv.a;
  var ua=userAnswer;
  var caLower=ca.toLowerCase();
  var uaLower=ua.toLowerCase();
  var isCorrect=false;

  if(uaLower===caLower){
    isCorrect=true;
  }else if(caLower.length<=6&&uaLower.length>=2){
    isCorrect=uaLower===caLower||caLower.indexOf(uaLower)===0||uaLower.indexOf(caLower)===0;
  }else if(caLower.length>6&&uaLower.length>=Math.ceil(caLower.length*0.4)){
    isCorrect=caLower.indexOf(uaLower)!==-1;
  }

  var result=$('gResult');
  result.style.display='block';
  if(isCorrect){
    result.className='g-result correct';
    result.innerHTML='🎉 回答正确！太棒了！';
    if(!done.has(curLv)){
      done.add(curLv);
      save();
      floatHint('✨ 通关！');
      if(done.size===L.length) setTimeout(showModal,800);
    }
    ansShow=true;
    $('gAns').classList.add('show');
    $('btnAns').textContent='隐藏答案';
  }else{
    result.className='g-result wrong';
    result.innerHTML='😅 回答错误，再想想吧！';
  }
}

function toggleAns(){
  if(!ansShow){
    ansShow=true;
    $('gAns').classList.add('show');
    $('btnAns').textContent='隐藏答案';
    if(!done.has(curLv)){
      done.add(curLv);
      save();
      floatHint('✨ 通关！');
      if(done.size===L.length) setTimeout(showModal,800);
    }
  }else{
    ansShow=false;
    $('gAns').classList.remove('show');
    $('btnAns').textContent='查看答案';
  }
}

function firstUndone(){for(var i=0;i<L.length;i++)if(!done.has(i))return i;return 0;}

function showModal(){$('modalBg').classList.add('show');confetti();}
function closeModal(){$('modalBg').classList.remove('show');done.clear();save();curLv=0;curPg=0;showPg('pgCover');}

function floatHint(t){
  var e=document.createElement('div');
  e.className='float-hint';e.textContent=t;
  document.body.appendChild(e);
  setTimeout(function(){e.remove()},850);
}

function confetti(){
  var cs=['#00b894','#00cec9','#ff9f43','#ee5a24','#ff6b6b','#a29bfe','#fd79a8'];
  for(var i=0;i<35;i++){
    (function(j){
      setTimeout(function(){
        var e=document.createElement('div');
        e.className='confetti';
        e.style.left=Math.random()*100+'vw';
        e.style.width=(6+Math.random()*8)+'px';
        e.style.height=(6+Math.random()*8)+'px';
        e.style.background=cs[Math.floor(Math.random()*cs.length)];
        e.style.borderRadius=Math.random()>.5?'50%':'2px';
        e.style.animationDuration=(2+Math.random()*2)+'s';
        document.body.appendChild(e);
        setTimeout(function(){e.remove()},4500);
      },j*50);
    })(i);
  }
}

function bindEvents(){
  $('btnStart').addEventListener('click',function(){showPg('pgSelect')});
  $('btnSelBack').addEventListener('click',function(){showPg('pgCover')});
  $('btnGameBack').addEventListener('click',function(){showPg('pgSelect')});
  $('btnPrev').addEventListener('click',function(){if(curPg>0){curPg--;renderSel()}});
  $('btnNext').addEventListener('click',function(){var tp=Math.ceil(L.length/PPG);if(curPg<tp-1){curPg++;renderSel()}});
  $('btnContinue').addEventListener('click',function(){curLv=firstUndone();showPg('pgGame')});
  $('btnReset').addEventListener('click',function(){if(confirm('确定重置所有进度？')){done.clear();save();curPg=0;renderSel();updCover()}});
  $('btnAns').addEventListener('click',toggleAns);
  $('btnPrevLv').addEventListener('click',function(){if(curLv>0){curLv--;renderGame()}});
  $('btnNextLv').addEventListener('click',function(){if(curLv<L.length-1){curLv++;renderGame()}});
  $('btnModal').addEventListener('click',closeModal);
  $('gSubmitBtn').addEventListener('click',submitAnswer);
  $('gInput').addEventListener('keyup',function(e){if(e.key==='Enter')submitAnswer()});

  $('selGrid').addEventListener('click',function(e){
    var c=e.target;
    while(c&&!c.classList.contains('level-card'))c=c.parentElement;
    if(c){var i=parseInt(c.getAttribute('data-i'));if(!isNaN(i)){curLv=i;showPg('pgGame')}}
  });
}

load();
updCover();
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',bindEvents);
}else{
  bindEvents();
}
</script>
</body>
</html>
