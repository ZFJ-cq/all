<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日记账</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .balance {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
        }
        
        .balance span {
            font-size: 16px;
            font-weight: 400;
            color: #999;
            margin-right: 4px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 6px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 18px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group input[type="number"]::placeholder {
            color: #ccc;
        }
        
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            resize: none;
            min-height: 80px;
            transition: border-color 0.3s ease;
        }
        
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            background: #f5f5f5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .category-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .category-item.active .category-icon {
            filter: brightness(0) invert(1);
        }
        
        .category-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        
        .category-name {
            font-size: 11px;
            text-align: center;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .history-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .history-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }
        
        .history-list {
            list-style: none;
        }
        
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-left {
            display: flex;
            align-items: center;
        }
        
        .history-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 12px;
        }
        
        .history-info {
            display: flex;
            flex-direction: column;
        }
        
        .history-name {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }
        
        .history-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        
        .history-right {
            text-align: right;
        }
        
        .history-amount {
            font-size: 16px;
            font-weight: 600;
        }
        
        .history-amount.income {
            color: #10b981;
        }
        
        .history-amount.expense {
            color: #ef4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }
        
        .empty-icon {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 12px;
        }
        
        .empty-text {
            color: #999;
            font-size: 14px;
        }
        
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .filter-item {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            background: #f5f5f5;
            color: #666;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .month-summary {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .month-item {
            text-align: center;
            flex: 1;
        }
        
        .month-value {
            font-size: 18px;
            font-weight: 600;
        }
        
        .month-value.income {
            color: #10b981;
        }
        
        .month-value.expense {
            color: #ef4444;
        }
        
        .month-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>今日余额</h1>
            <div class="balance"><span>¥</span><span id="balance">0.00</span></div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" style="color: #10b981;">¥<span id="totalIncome">0.00</span></div>
                    <div class="stat-label">本月收入</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: #ef4444;">¥<span id="totalExpense">0.00</span></div>
                    <div class="stat-label">本月支出</div>
                </div>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-tab="expense">支出</div>
            <div class="tab" data-tab="income">收入</div>
            <div class="tab" data-tab="history">明细</div>
        </div>
        
        <div class="tab-content" id="expense-panel">
            <div class="form-card">
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" id="expenseAmount" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <div class="categories" id="expenseCategories">
                        <div class="category-item active" data-category="餐饮">
                            <div class="category-icon">🍔</div>
                            <div class="category-name">餐饮</div>
                        </div>
                        <div class="category-item" data-category="交通">
                            <div class="category-icon">🚗</div>
                            <div class="category-name">交通</div>
                        </div>
                        <div class="category-item" data-category="购物">
                            <div class="category-icon">🛍️</div>
                            <div class="category-name">购物</div>
                        </div>
                        <div class="category-item" data-category="娱乐">
                            <div class="category-icon">🎮</div>
                            <div class="category-name">娱乐</div>
                        </div>
                        <div class="category-item" data-category="住房">
                            <div class="category-icon">🏠</div>
                            <div class="category-name">住房</div>
                        </div>
                        <div class="category-item" data-category="医疗">
                            <div class="category-icon">💊</div>
                            <div class="category-name">医疗</div>
                        </div>
                        <div class="category-item" data-category="教育">
                            <div class="category-icon">📚</div>
                            <div class="category-name">教育</div>
                        </div>
                        <div class="category-item" data-category="其他">
                            <div class="category-icon">📝</div>
                            <div class="category-name">其他</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="expenseNote" placeholder="添加备注..."></textarea>
                </div>
                <button class="btn btn-primary" id="addExpense">记一笔支出</button>
            </div>
        </div>
        
        <div class="tab-content" id="income-panel" style="display: none;">
            <div class="form-card">
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" id="incomeAmount" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <div class="categories" id="incomeCategories">
                        <div class="category-item active" data-category="工资">
                            <div class="category-icon">💼</div>
                            <div class="category-name">工资</div>
                        </div>
                        <div class="category-item" data-category="奖金">
                            <div class="category-icon">🎁</div>
                            <div class="category-name">奖金</div>
                        </div>
                        <div class="category-item" data-category="投资">
                            <div class="category-icon">📈</div>
                            <div class="category-name">投资</div>
                        </div>
                        <div class="category-item" data-category="兼职">
                            <div class="category-icon">💻</div>
                            <div class="category-name">兼职</div>
                        </div>
                        <div class="category-item" data-category="红包">
                            <div class="category-icon">🧧</div>
                            <div class="category-name">红包</div>
                        </div>
                        <div class="category-item" data-category="退款">
                            <div class="category-icon">💰</div>
                            <div class="category-name">退款</div>
                        </div>
                        <div class="category-item" data-category="其他">
                            <div class="category-icon">📝</div>
                            <div class="category-name">其他</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="incomeNote" placeholder="添加备注..."></textarea>
                </div>
                <button class="btn btn-primary" id="addIncome">记一笔收入</button>
            </div>
        </div>
        
        <div class="tab-content" id="history-panel" style="display: none;">
            <div class="history-card">
                <div class="month-summary">
                    <div class="month-item">
                        <div class="month-value income">¥<span id="monthIncome">0.00</span></div>
                        <div class="month-label">本月收入</div>
                    </div>
                    <div class="month-item">
                        <div class="month-value expense">¥<span id="monthExpense">0.00</span></div>
                        <div class="month-label">本月支出</div>
                    </div>
                    <div class="month-item">
                        <div class="month-value" style="color: #667eea;">¥<span id="monthBalance">0.00</span></div>
                        <div class="month-label">本月结余</div>
                    </div>
                </div>
                
                <div class="filter-bar">
                    <div class="filter-item active" data-filter="all">全部</div>
                    <div class="filter-item" data-filter="expense">支出</div>
                    <div class="filter-item" data-filter="income">收入</div>
                </div>
                
                <div class="history-title">交易明细</div>
                <ul class="history-list" id="historyList">
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div class="empty-text">暂无交易记录</div>
                    </div>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        const expenseCategories = ['餐饮', '交通', '购物', '娱乐', '住房', '医疗', '教育', '其他'];
        const expenseIcons = ['🍔', '🚗', '🛍️', '🎮', '🏠', '💊', '📚', '📝'];
        const incomeCategories = ['工资', '奖金', '投资', '兼职', '红包', '退款', '其他'];
        const incomeIcons = ['💼', '🎁', '📈', '💻', '🧧', '💰', '📝'];
        
        let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
        let currentTab = 'expense';
        let currentFilter = 'all';
        
        function formatMoney(value) {
            return parseFloat(value).toFixed(2);
        }
        
        function updateBalance() {
            const income = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + parseFloat(t.amount), 0);
            const expense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + parseFloat(t.amount), 0);
            const balance = income - expense;
            
            document.getElementById('balance').textContent = formatMoney(balance);
            document.getElementById('totalIncome').textContent = formatMoney(income);
            document.getElementById('totalExpense').textContent = formatMoney(expense);
            document.getElementById('monthIncome').textContent = formatMoney(income);
            document.getElementById('monthExpense').textContent = formatMoney(expense);
            document.getElementById('monthBalance').textContent = formatMoney(balance);
        }
        
        function addTransaction(type) {
            const amountInput = type === 'expense' ? document.getElementById('expenseAmount') : document.getElementById('incomeAmount');
            const noteInput = type === 'expense' ? document.getElementById('expenseNote') : document.getElementById('incomeNote');
            const categories = type === 'expense' ? expenseCategories : incomeCategories;
            
            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim();
            const selectedCategory = document.querySelector(`#${type}Categories .category-item.active`).dataset.category;
            
            if (!amount || amount <= 0) {
                alert('请输入有效金额');
                return;
            }
            
            const transaction = {
                id: Date.now(),
                type: type,
                amount: amount.toString(),
                category: selectedCategory,
                note: note,
                date: new Date().toISOString()
            };
            
            transactions.unshift(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            amountInput.value = '';
            noteInput.value = '';
            
            updateBalance();
            renderHistory();
            
            alert('记录成功！');
        }
        
        function getCategoryIcon(category, type) {
            const categories = type === 'expense' ? expenseCategories : incomeCategories;
            const icons = type === 'expense' ? expenseIcons : incomeIcons;
            const index = categories.indexOf(category);
            return icons[index] || '📝';
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffTime = now - date;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) {
                return '今天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else if (diffDays === 1) {
                return '昨天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            }
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            let filtered = transactions;
            
            if (currentFilter !== 'all') {
                filtered = transactions.filter(t => t.type === currentFilter);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div class="empty-text">暂无交易记录</div>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(t => `
                <li class="history-item">
                    <div class="history-left">
                        <div class="history-icon" style="background: ${t.type === 'income' ? '#d1fae5' : '#fee2e2'}">
                            ${getCategoryIcon(t.category, t.type)}
                        </div>
                        <div class="history-info">
                            <div class="history-name">${t.category}${t.note ? ` - ${t.note}` : ''}</div>
                            <div class="history-date">${formatDate(t.date)}</div>
                        </div>
                    </div>
                    <div class="history-right">
                        <div class="history-amount ${t.type}">${t.type === 'income' ? '+' : '-'}¥${formatMoney(t.amount)}</div>
                    </div>
                </li>
            `).join('');
        }
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.style.display = 'none';
                });
                document.getElementById(`${currentTab}-panel`).style.display = 'block';
                
                if (currentTab === 'history') {
                    renderHistory();
                }
            });
        });
        
        document.querySelectorAll('#expenseCategories .category-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#expenseCategories .category-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
        
        document.querySelectorAll('#incomeCategories .category-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#incomeCategories .category-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
        
        document.querySelectorAll('.filter-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentFilter = item.dataset.filter;
                renderHistory();
            });
        });
        
        document.getElementById('addExpense').addEventListener('click', () => addTransaction('expense'));
        document.getElementById('addIncome').addEventListener('click', () => addTransaction('income'));
        
        updateBalance();
    </script>
</body>
</html>
