<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI 计算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0f1f1a;
      --bg-card: #1a2f2a;
      --bg-card-light: #223d35;
      --accent: #4ade80;
      --accent-glow: rgba(74, 222, 128, 0.15);
      --text-primary: #e8f5e9;
      --text-secondary: #8fb8a0;
      --text-muted: #5a8a70;
      --blue: #60a5fa;
      --green: #4ade80;
      --gold: #fbbf24;
      --red: #f87171;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(74, 222, 128, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(96, 165, 250, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 20% 90%, rgba(251, 191, 36, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease-out;
    }

    .header h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 2.8rem;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--accent) 0%, #86efac 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 8px;
      font-weight: 400;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid rgba(74, 222, 128, 0.08);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      animation: fadeUp 0.6s ease-out both;
    }

    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }
    .card:nth-child(4) { animation-delay: 0.3s; }

    /* 输入区域 */
    .input-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .input-wrapper label .current-val {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--accent);
      transition: color 0.3s;
    }

    .input-field {
      position: relative;
    }

    .input-field input[type="number"] {
      width: 100%;
      background: var(--bg-deep);
      border: 1.5px solid rgba(74, 222, 128, 0.12);
      border-radius: var(--radius-sm);
      padding: 14px 50px 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      -moz-appearance: textfield;
    }

    .input-field input[type="number"]::-webkit-outer-spin-button,
    .input-field input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .input-field input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 0.95rem;
    }

    .input-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-field input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.15);
    }

    .input-field .unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      pointer-events: none;
    }

    .error-msg {
      font-size: 0.75rem;
      color: var(--red);
      margin-top: 6px;
      min-height: 1.1em;
      transition: opacity 0.2s;
    }

    /* 滑块 */
    .slider-wrapper {
      margin-top: 10px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-deep);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg-card);
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 14px rgba(74, 222, 128, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg-card);
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
      cursor: pointer;
    }

    /* 按钮组 */
    .btn-group {
      display: flex;
      gap: 12px;
    }

    .btn-calculate {
      flex: 1;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), #22c55e);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--bg-deep);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-calculate:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 24px rgba(74, 222, 128, 0.25);
      filter: brightness(1.05);
    }

    .btn-calculate:active {
      transform: translateY(0) scale(0.99);
    }

    .btn-reset {
      padding: 16px 20px;
      background: transparent;
      border: 1.5px solid rgba(74, 222, 128, 0.15);
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-reset:hover {
      border-color: rgba(74, 222, 128, 0.3);
      color: var(--text-secondary);
      background: rgba(74, 222, 128, 0.04);
    }

    /* 结果区域 */
    .result-section {
      display: none;
      text-align: center;
    }

    .result-section.visible {
      display: block;
      animation: fadeUp 0.5s ease-out;
    }

    /* 仪表盘 */
    .gauge-container {
      position: relative;
      width: 280px;
      height: 160px;
      margin: 0 auto 20px;
    }

    .gauge-svg {
      width: 100%;
      height: 100%;
    }

    .gauge-svg .arc-segment {
      transition: opacity 0.4s, filter 0.4s;
    }

    .gauge-svg .arc-segment.dimmed {
      opacity: 0.25 !important;
    }

    .gauge-svg .arc-segment.lit {
      filter: drop-shadow(0 0 6px currentColor);
    }

    .gauge-labels {
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
      margin-top: -4px;
    }

    .gauge-labels span {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .gauge-labels span.active-label {
      font-weight: 700;
    }

    /* BMI数值 */
    .bmi-value {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 4rem;
      line-height: 1;
      margin: 8px 0 4px;
      transition: color 0.4s;
    }

    .bmi-category {
      display: inline-block;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 6px 20px;
      border-radius: 999px;
      margin-bottom: 12px;
      transition: background 0.4s, color 0.4s;
      animation: subtlePulse 2s ease-in-out infinite;
    }

    @keyframes subtlePulse {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50% { box-shadow: 0 0 12px -2px var(--pulse-color, transparent); }
    }

    .bmi-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 360px;
      margin: 0 auto;
    }

    /* 健康体重范围 */
    .healthy-range {
      margin-top: 16px;
      padding: 14px 18px;
      background: rgba(74, 222, 128, 0.06);
      border: 1px solid rgba(74, 222, 128, 0.1);
      border-radius: var(--radius-sm);
      text-align: left;
    }

    .healthy-range .range-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .healthy-range .range-value {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--text-primary);
    }

    .healthy-range .range-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* 参考表 */
    .ref-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .ref-table th {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(74, 222, 128, 0.08);
    }

    .ref-table td {
      padding: 12px;
      border-bottom: 1px solid rgba(74, 222, 128, 0.05);
      color: var(--text-secondary);
      transition: background 0.3s, color 0.3s;
    }

    .ref-table tr.active td {
      color: var(--text-primary);
      font-weight: 600;
    }

    .ref-table .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      transition: box-shadow 0.3s;
    }

    .ref-table tr.active .dot {
      box-shadow: 0 0 8px currentColor;
    }

    .ref-table tr.active td:first-child {
      position: relative;
      padding-left: 17px;
    }

    .ref-table tr.active td:first-child::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      border-radius: 2px;
      background: var(--active-color, var(--accent));
    }

    /* 页脚 */
    .footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.78rem;
      animation: fadeUp 0.6s ease-out 0.4s both;
    }

    /* 动画 */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .header h1 { font-size: 2.2rem; }
      .card { padding: 24px 20px; }
      .input-group { grid-template-columns: 1fr; gap: 16px; }
      .bmi-value { font-size: 3.2rem; }
      .gauge-container { width: 240px; height: 140px; }
      .btn-group { flex-direction: column; }
      .btn-reset { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>BMI 计算器</h1>
      <p>了解你的身体质量指数，掌握健康状态</p>
    </header>

    <!-- 输入卡片 -->
    <div class="card">
      <div class="input-group">
        <div class="input-wrapper">
          <label for="height">
            身高
            <span class="current-val" id="heightVal">170 cm</span>
          </label>
          <div class="input-field">
            <input type="number" id="height" placeholder="170" min="50" max="250" step="0.1">
            <span class="unit">cm</span>
          </div>
          <div class="error-msg" id="heightError"></div>
          <div class="slider-wrapper">
            <input type="range" id="heightSlider" min="100" max="220" value="170" step="1">
          </div>
        </div>
        <div class="input-wrapper">
          <label for="weight">
            体重
            <span class="current-val" id="weightVal">65 kg</span>
          </label>
          <div class="input-field">
            <input type="number" id="weight" placeholder="65" min="10" max="300" step="0.1">
            <span class="unit">kg</span>
          </div>
          <div class="error-msg" id="weightError"></div>
          <div class="slider-wrapper">
            <input type="range" id="weightSlider" min="30" max="150" value="65" step="0.5">
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn-calculate" id="calcBtn">计算 BMI</button>
        <button class="btn-reset" id="resetBtn">重置</button>
      </div>
    </div>

    <!-- 结果卡片 -->
    <div class="card result-section" id="resultSection">
      <div class="gauge-container">
        <svg class="gauge-svg" viewBox="0 0 280 160">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <!-- 背景弧 -->
          <path d="M 30 140 A 110 110 0 0 1 250 140" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="20" stroke-linecap="round"/>
          <!-- 蓝色区间 偏瘦 <18.5 -->
          <path class="arc-segment" id="arc-underweight" d="M 30 140 A 110 110 0 0 1 72.3 51.3" fill="none" stroke="#60a5fa" stroke-width="20" stroke-linecap="round" opacity="0.7" style="color:#60a5fa"/>
          <!-- 绿色区间 正常 18.5-24 -->
          <path class="arc-segment" id="arc-normal" d="M 72.3 51.3 A 110 110 0 0 1 185.2 37.7" fill="none" stroke="#4ade80" stroke-width="20" stroke-linecap="round" opacity="0.7" style="color:#4ade80"/>
          <!-- 金色区间 偏胖 24-28 -->
          <path class="arc-segment" id="arc-overweight" d="M 185.2 37.7 A 110 110 0 0 1 237.6 82.5" fill="none" stroke="#fbbf24" stroke-width="20" stroke-linecap="round" opacity="0.7" style="color:#fbbf24"/>
          <!-- 红色区间 肥胖 >=28 -->
          <path class="arc-segment" id="arc-obese" d="M 237.6 82.5 A 110 110 0 0 1 250 140" fill="none" stroke="#f87171" stroke-width="20" stroke-linecap="round" opacity="0.7" style="color:#f87171"/>
          <!-- 指针 -->
          <g id="needle" style="transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: 140px 140px;">
            <line x1="140" y1="140" x2="140" y2="48" stroke="var(--text-primary)" stroke-width="3" stroke-linecap="round"/>
            <circle cx="140" cy="140" r="8" fill="var(--bg-card)" stroke="var(--text-primary)" stroke-width="2.5"/>
          </g>
        </svg>
      </div>
      <div class="gauge-labels">
        <span id="label-underweight">偏瘦</span>
        <span id="label-normal">正常</span>
        <span id="label-overweight">偏胖</span>
        <span id="label-obese">肥胖</span>
      </div>
      <div class="bmi-value" id="bmiValue">--</div>
      <div class="bmi-category" id="bmiCategory">--</div>
      <p class="bmi-desc" id="bmiDesc"></p>
      <div class="healthy-range" id="healthyRange" style="display:none">
        <div class="range-title">基于你的身高，健康体重范围</div>
        <div class="range-value" id="rangeValue"></div>
        <div class="range-hint">BMI 18.5 – 24 为正常区间</div>
      </div>
    </div>

    <!-- 参考表卡片 -->
    <div class="card result-section" id="refSection">
      <table class="ref-table">
        <thead>
          <tr>
            <th>分类</th>
            <th>BMI 范围</th>
            <th>健康风险</th>
          </tr>
        </thead>
        <tbody id="refBody">
          <tr data-range="underweight">
            <td><span class="dot" style="background:#60a5fa;color:#60a5fa"></span>偏瘦</td>
            <td>&lt; 18.5</td>
            <td>营养不良风险</td>
          </tr>
          <tr data-range="normal">
            <td><span class="dot" style="background:#4ade80;color:#4ade80"></span>正常</td>
            <td>18.5 – 24</td>
            <td>风险较低</td>
          </tr>
          <tr data-range="overweight">
            <td><span class="dot" style="background:#fbbf24;color:#fbbf24"></span>偏胖</td>
            <td>24 – 28</td>
            <td>慢性病风险增加</td>
          </tr>
          <tr data-range="obese">
            <td><span class="dot" style="background:#f87171;color:#f87171"></span>肥胖</td>
            <td>&ge; 28</td>
            <td>心血管疾病高风险</td>
          </tr>
        </tbody>
      </table>
    </div>

    <footer class="footer">
      BMI 仅为参考指标，具体健康状况请咨询专业医生
    </footer>
  </div>

  <script>
    const heightInput = document.getElementById('height');
    const weightInput = document.getElementById('weight');
    const heightSlider = document.getElementById('heightSlider');
    const weightSlider = document.getElementById('weightSlider');
    const heightVal = document.getElementById('heightVal');
    const weightVal = document.getElementById('weightVal');
    const heightError = document.getElementById('heightError');
    const weightError = document.getElementById('weightError');
    const calcBtn = document.getElementById('calcBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultSection = document.getElementById('resultSection');
    const refSection = document.getElementById('refSection');
    const bmiValueEl = document.getElementById('bmiValue');
    const bmiCategoryEl = document.getElementById('bmiCategory');
    const bmiDescEl = document.getElementById('bmiDesc');
    const healthyRange = document.getElementById('healthyRange');
    const rangeValue = document.getElementById('rangeValue');
    const needle = document.getElementById('needle');
    const refRows = document.querySelectorAll('#refBody tr');
    const arcSegments = document.querySelectorAll('.arc-segment');
    const gaugeLabels = document.querySelectorAll('.gauge-labels span');

    let animFrame = null;

    const categories = [
      { key: 'underweight', label: '偏瘦', color: '#60a5fa', min: 0, max: 18.5, desc: '你的体重偏低，建议均衡饮食、增加营养摄入，适当进行力量训练以增强体质。' },
      { key: 'normal', label: '正常', color: '#4ade80', min: 18.5, max: 24, desc: '你的体重处于健康范围，请继续保持良好的饮食和运动习惯。' },
      { key: 'overweight', label: '偏胖', color: '#fbbf24', min: 24, max: 28, desc: '你的体重略高于正常范围，建议控制饮食热量摄入，增加有氧运动频率。' },
      { key: 'obese', label: '肥胖', color: '#f87171', min: 28, max: 50, desc: '你的体重明显超标，建议尽快咨询医生，制定科学的减重计划。' },
    ];

    // 滑块与输入框同步
    function syncSliderToInput(slider, input, label, unit) {
      slider.addEventListener('input', () => {
        input.value = slider.value;
        label.textContent = slider.value + ' ' + unit;
        clearError(input === heightInput ? heightError : weightError, input);
        tryCalc();
      });
    }

    function syncInputToSlider(input, slider, label, unit, min, max) {
      input.addEventListener('input', () => {
        const v = parseFloat(input.value);
        if (!isNaN(v) && v >= parseFloat(slider.min) && v <= parseFloat(slider.max)) {
          slider.value = v;
        }
        label.textContent = (isNaN(v) ? '--' : v) + ' ' + unit;
        clearError(input === heightInput ? heightError : weightError, input);
        tryCalc();
      });
    }

    syncSliderToInput(heightSlider, heightInput, heightVal, 'cm');
    syncSliderToInput(weightSlider, weightInput, weightVal, 'kg');
    syncInputToSlider(heightInput, heightSlider, heightVal, 'cm', 100, 220);
    syncInputToSlider(weightInput, weightSlider, weightVal, 'kg', 30, 150);

    function clearError(errorEl, input) {
      errorEl.textContent = '';
      input.classList.remove('error');
    }

    function showError(errorEl, input, msg) {
      errorEl.textContent = msg;
      input.classList.add('error');
    }

    function validate() {
      let valid = true;
      const h = parseFloat(heightInput.value);
      const w = parseFloat(weightInput.value);

      if (!heightInput.value) {
        showError(heightError, heightInput, '请输入身高');
        valid = false;
      } else if (isNaN(h) || h < 50 || h > 250) {
        showError(heightError, heightInput, '身高范围 50-250 cm');
        valid = false;
      } else {
        clearError(heightError, heightInput);
      }

      if (!weightInput.value) {
        showError(weightError, weightInput, '请输入体重');
        valid = false;
      } else if (isNaN(w) || w < 10 || w > 300) {
        showError(weightError, weightInput, '体重范围 10-300 kg');
        valid = false;
      } else {
        clearError(weightError, weightInput);
      }

      return valid;
    }

    function bmiToAngle(bmi) {
      const clamped = Math.max(10, Math.min(40, bmi));
      const segments = [
        { bmiStart: 10, bmiEnd: 18.5, angleStart: 0, angleEnd: 50 },
        { bmiStart: 18.5, bmiEnd: 24, angleStart: 50, angleEnd: 110 },
        { bmiStart: 24, bmiEnd: 28, angleStart: 110, angleEnd: 145 },
        { bmiStart: 28, bmiEnd: 40, angleStart: 145, angleEnd: 180 },
      ];
      for (const seg of segments) {
        if (clamped >= seg.bmiStart && clamped <= seg.bmiEnd) {
          const ratio = (clamped - seg.bmiStart) / (seg.bmiEnd - seg.bmiStart);
          return seg.angleStart + ratio * (seg.angleEnd - seg.angleStart);
        }
      }
      return 180;
    }

    function getCategory(bmi) {
      for (const cat of categories) {
        if (bmi >= cat.min && bmi < cat.max) return cat;
      }
      return categories[categories.length - 1];
    }

    // 数值动画
    function animateValue(el, start, end, duration, color) {
      if (animFrame) cancelAnimationFrame(animFrame);
      const startTime = performance.now();
      function update(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = start + (end - start) * eased;
        el.textContent = current.toFixed(1);
        if (progress < 1) {
          animFrame = requestAnimationFrame(update);
        } else {
          el.textContent = end.toFixed(1);
        }
      }
      animFrame = requestAnimationFrame(update);
    }

    function tryCalc() {
      const h = parseFloat(heightInput.value);
      const w = parseFloat(weightInput.value);
      if (h && w && h > 0 && w > 0) calculate();
    }

    function calculate() {
      if (!validate()) return;

      const h = parseFloat(heightInput.value);
      const w = parseFloat(weightInput.value);
      const hm = h / 100;
      const bmi = w / (hm * hm);
      const rounded = Math.round(bmi * 10) / 10;
      const cat = getCategory(rounded);

      resultSection.classList.add('visible');
      refSection.classList.add('visible');

      // 数值动画
      const prevVal = parseFloat(bmiValueEl.textContent) || 0;
      animateValue(bmiValueEl, prevVal, rounded, 500);
      bmiValueEl.style.color = cat.color;

      bmiCategoryEl.textContent = cat.label;
      bmiCategoryEl.style.background = cat.color + '1a';
      bmiCategoryEl.style.color = cat.color;
      bmiCategoryEl.style.setProperty('--pulse-color', cat.color + '40');

      bmiDescEl.textContent = cat.desc;

      // 健康体重范围
      const minW = Math.round(18.5 * hm * hm * 10) / 10;
      const maxW = Math.round(24 * hm * hm * 10) / 10;
      healthyRange.style.display = 'block';
      rangeValue.textContent = minW + ' – ' + maxW + ' kg';

      // 指针
      const angle = bmiToAngle(rounded);
      needle.style.transform = `rotate(${angle}deg)`;

      // 仪表盘高亮
      arcSegments.forEach(arc => {
        const arcKey = arc.id.replace('arc-', '');
        if (arcKey === cat.key) {
          arc.classList.add('lit');
          arc.classList.remove('dimmed');
          arc.style.opacity = '1';
        } else {
          arc.classList.remove('lit');
          arc.classList.add('dimmed');
        }
      });

      // 仪表盘标签高亮
      gaugeLabels.forEach(label => {
        const labelKey = label.id.replace('label-', '');
        if (labelKey === cat.key) {
          label.classList.add('active-label');
          label.style.color = cat.color;
        } else {
          label.classList.remove('active-label');
          label.style.color = '';
        }
      });

      // 参考表高亮
      refRows.forEach(row => {
        const isActive = row.dataset.range === cat.key;
        row.classList.toggle('active', isActive);
        row.style.setProperty('--active-color', cat.color);
        if (isActive) {
          row.style.background = cat.color + '0a';
        } else {
          row.style.background = 'transparent';
        }
      });
    }

    function resetAll() {
      heightInput.value = '';
      weightInput.value = '';
      heightSlider.value = 170;
      weightSlider.value = 65;
      heightVal.textContent = '170 cm';
      weightVal.textContent = '65 kg';
      clearError(heightError, heightInput);
      clearError(weightError, weightInput);
      resultSection.classList.remove('visible');
      refSection.classList.remove('visible');
      bmiValueEl.textContent = '--';
      bmiCategoryEl.textContent = '--';
      bmiDescEl.textContent = '';
      healthyRange.style.display = 'none';
      needle.style.transform = 'rotate(0deg)';
      arcSegments.forEach(arc => {
        arc.classList.remove('lit', 'dimmed');
        arc.style.opacity = '0.7';
      });
      gaugeLabels.forEach(label => {
        label.classList.remove('active-label');
        label.style.color = '';
      });
      refRows.forEach(row => {
        row.classList.remove('active');
        row.style.background = 'transparent';
      });
    }

    calcBtn.addEventListener('click', calculate);
    resetBtn.addEventListener('click', resetAll);

    heightInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') calculate(); });
    weightInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') calculate(); });
  </script>
</body>
</html>
