<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1A73E8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="轨迹记录">
  <meta name="description" content="纯本地、零注册的个人轨迹记录工具">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  <title>轨迹记录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 地图容器 -->
  <div id="map-container"></div>

  <!-- 离线提示 -->
  <div id="offline-tip" class="offline-tip">当前无网络，地图功能不可用</div>

  <!-- 顶部导航栏 -->
  <div class="top-bar">
    <button id="btn-history" class="top-bar-btn" title="历史">📋</button>
    <div class="top-bar-title">轨迹记录</div>
    <button id="btn-settings" class="top-bar-btn" title="设置">⚙️</button>
  </div>

  <!-- 录制信息条 -->
  <div id="tracking-info" class="tracking-info">
    <div class="tracking-status" id="tracking-status">
      <span class="tracking-status-dot"></span>
      <span id="tracking-status-text">等待定位</span>
      <span class="tracking-status-meta" id="tracking-points">0 个点</span>
    </div>
    <div class="tracking-info-row">
      <div class="tracking-info-item">
        <div class="tracking-info-value" id="tracking-distance">0 m</div>
        <div class="tracking-info-label">距离</div>
      </div>
      <div class="tracking-info-item">
        <div class="tracking-info-value" id="tracking-time">0:00</div>
        <div class="tracking-info-label">时长</div>
      </div>
      <div class="tracking-info-item">
        <div class="tracking-info-value" id="tracking-speed">0.0 km/h</div>
        <div class="tracking-info-label">均速</div>
      </div>
    </div>
  </div>

  <!-- 底部操作按钮 -->
  <div class="bottom-actions">
    <!-- 开始记录按钮 -->
    <button id="btn-record" class="btn-record">
      <div class="record-dot"></div>
    </button>
    <!-- 暂停/停止按钮组 -->
    <div id="btn-group" class="btn-group">
      <button id="btn-pause" class="btn-pause">
        <div class="pause-icon"><span></span><span></span></div>
        <div class="play-icon"></div>
      </button>
      <button id="btn-stop" class="btn-stop">
        <div class="stop-icon"></div>
      </button>
    </div>
  </div>

  <!-- PWA 安装提示 -->
  <div id="install-banner" class="install-banner" style="display:none;">
    <span class="install-banner-text">添加到主屏幕，获得更好体验</span>
    <button class="install-banner-btn" onclick="installApp()">安装</button>
  </div>

  <!-- ===== 历史列表页 ===== -->
  <div id="history-page" class="page">
    <div class="page-header">
      <button id="history-back" class="back-btn">←</button>
      <div class="page-title">历史轨迹</div>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>

  <!-- ===== 设置页 ===== -->
  <div id="settings-page" class="page">
    <div class="page-header">
      <button id="settings-back" class="back-btn">←</button>
      <div class="page-title">设置</div>
    </div>
    <div class="settings-list">
      <div class="settings-group">
        <div class="settings-group-title">录制保护</div>
        <div class="settings-item">
          <span class="settings-item-label">后台超时时间</span>
          <select id="background-timeout-select">
            <option value="300000">5分钟</option>
            <option value="600000">10分钟</option>
            <option value="1800000">30分钟</option>
            <option value="3600000" selected>1小时</option>
            <option value="7200000">2小时</option>
          </select>
        </div>
        <div class="settings-item">
          <span class="settings-item-label">当前电量</span>
          <span class="settings-item-value" id="battery-info">--</span>
        </div>
        <div class="settings-item">
          <span class="settings-item-label">低电量保护</span>
          <span class="settings-item-value">低于20%自动暂停</span>
        </div>
        <div class="settings-item">
          <span class="settings-item-label">离线保护</span>
          <span class="settings-item-value">离线10分钟自动暂停</span>
        </div>
        <div class="settings-item">
          <span class="settings-item-label">异常移动保护</span>
          <span class="settings-item-value">后台移动500m自动暂停</span>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">存储</div>
        <div class="settings-item">
          <span class="settings-item-label">已用空间</span>
          <span class="settings-item-value" id="storage-usage">0 MB / 5 MB</span>
        </div>
        <div class="storage-bar">
          <div class="storage-bar-fill" id="storage-bar-fill" style="width: 0%"></div>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">数据管理</div>
        <button id="btn-clear-data" class="btn-clear-data">清除所有轨迹数据</button>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">关于</div>
        <div class="settings-item">
          <span class="settings-item-label">版本</span>
          <span class="settings-item-value">1.0.0</span>
        </div>
        <div class="settings-item">
          <span class="settings-item-label">技术栈</span>
          <span class="settings-item-value">PWA + 高德地图</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 轨迹回放页 ===== -->
  <div id="playback-page" class="page">
    <div class="page-header">
      <button id="playback-back" class="back-btn">←</button>
      <div class="page-title">轨迹回放</div>
    </div>
    <div id="track-detail-info" class="track-detail-info"></div>
    <div id="playback-map"></div>
    <div class="playback-controls">
      <div class="playback-progress">
        <span class="playback-time" id="playback-current-time">0:00</span>
        <input type="range" id="playback-progress" min="0" max="100" value="0">
        <span class="playback-time" id="playback-total-time">0:00</span>
      </div>
      <div class="playback-actions">
        <div class="speed-selector">
          <button class="speed-btn active" data-speed="1">1x</button>
          <button class="speed-btn" data-speed="2">2x</button>
          <button class="speed-btn" data-speed="4">4x</button>
          <button class="speed-btn" data-speed="8">8x</button>
        </div>
        <button id="btn-play" class="btn-play">
          <div class="play-triangle"></div>
          <div class="pause-bars"><span></span><span></span></div>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== 模态框 ===== -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">提示</div>
      <div class="modal-message" id="modal-message">确定要执行此操作吗？</div>
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-btn modal-btn-cancel">取消</button>
        <button id="modal-confirm" class="modal-btn modal-btn-confirm">确定</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- 应用脚本：先定义 onAMapLoaded，再加载高德地图回调脚本 -->
  <script src="js/storage.js"></script>
  <script src="js/map.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/player.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>

  <!-- 高德地图 JS API -->
  <script type="text/javascript">
    window._AMapSecurityConfig = {
      securityJsCode: 'cf90157d0b92aec66e5e2be42698722a'
    };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=7d514d6834c8aba1bfcd7ab7717c7ef2&plugin=AMap.Scale,AMap.ToolBar,AMap.Geolocation&callback=onAMapLoaded"></script>

  <!-- Service Worker 注册 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(r => console.log('SW 注册成功:', r.scope))
          .catch(e => console.log('SW 注册失败:', e));
      });
    }
  </script>

</body>
</html>
